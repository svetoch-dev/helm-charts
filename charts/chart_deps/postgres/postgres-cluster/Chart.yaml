apiVersion: v2
appVersion: "1.0"
description: helm chart for creating postgres clusters using zolando postgres operator
name: postgres-cluster
version: 0.1.0

dependencies:
  - name: fluentbit-lib
    version: 0.1.0
    repository: file://../../fluent/fluentbit/lib
  - name: prometheus-rules
    version: 0.1.0
    repository: file://../../prometheus/prometheus-rules
    alias: prometheus-rules
    condition: prometheus-rules.enabled
